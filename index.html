<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 기하 시뮬레이션: SVM 공간 분할</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 320px;
        }
        h3 { margin-top: 0; margin-bottom: 15px; color: #333; font-size: 1.2rem; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .info { font-size: 0.8rem; color: #666; margin-top: 15px; line-height: 1.4; }
        .legend { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; font-weight: bold;}
        .red-dot { color: #ff4757; }
        .blue-dot { color: #1e90ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h3>기하 공간 분할 (SVM)</h3>
        <div class="legend">
            <span class="red-dot">● 집단 A (ex. 정상)</span>
            <span class="blue-dot">● 집단 B (ex. 암)</span>
        </div>
        
        <div class="control-group">
            <label for="angleY">평면 회전 (가중치 벡터 변경)</label>
            <input type="range" id="angleY" min="-1.5" max="1.5" step="0.01" value="0">
        </div>
        
        <div class="control-group">
            <label for="marginSize">마진(Margin) 크기 조절</label>
            <input type="range" id="marginSize" min="0" max="15" step="0.5" value="5">
        </div>

        <div class="info">
            * 마우스를 드래그하여 3차원 공간을 회전해 보세요.<br>
            * 가운데 진한 평면이 <b>결정 경계(Hyperplane)</b>입니다.<br>
            * 양옆 반투명 평면이 <b>마진(Margin)</b>을 나타냅니다.
        </div>
    </div>

    <script>
        // 1. 씬, 카메라, 렌더러 설정
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2d3436);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. 조명 설정
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 3. 축 도우미 (x, y, z축)
        const axesHelper = new THREE.AxesHelper(30);
        scene.add(axesHelper);

        // 4. 데이터 포인트 생성 함수
        function createDataPoints(color, count, offsetX) {
            const geometry = new THREE.SphereGeometry(0.8, 16, 16);
            const material = new THREE.MeshPhongMaterial({ color: color });
            const group = new THREE.Group();

            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(geometry, material);
                // 점들을 무작위 공간에 배치
                mesh.position.x = (Math.random() - 0.5) * 15 + offsetX;
                mesh.position.y = (Math.random() - 0.5) * 20;
                mesh.position.z = (Math.random() - 0.5) * 20;
                group.add(mesh);
            }
            return group;
        }

        // 집단 A (빨간색)와 집단 B (파란색) 생성
        const groupA = createDataPoints(0xff4757, 40, -15);
        const groupB = createDataPoints(0x1e90ff, 40, 15);
        scene.add(groupA);
        scene.add(groupB);

        // 5. 평면(Hyperplane) 및 마진(Margin) 생성
        const planeGroup = new THREE.Group();

        // 메인 결정 경계 평면
        const planeGeo = new THREE.PlaneGeometry(40, 40);
        const planeMat = new THREE.MeshPhongMaterial({ 
            color: 0x00b894, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.8 
        });
        const hyperPlane = new THREE.Mesh(planeGeo, planeMat);
        hyperPlane.rotation.y = Math.PI / 2; // 평면 세우기
        planeGroup.add(hyperPlane);

        // 마진 평면 설정 (반투명)
        const marginMat = new THREE.MeshPhongMaterial({ 
            color: 0xfdccb6, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.3 
        });
        
        const marginPlane1 = new THREE.Mesh(planeGeo, marginMat);
        marginPlane1.rotation.y = Math.PI / 2;
        marginPlane1.position.x = -5; // 초기 마진 거리
        planeGroup.add(marginPlane1);

        const marginPlane2 = new THREE.Mesh(planeGeo, marginMat);
        marginPlane2.rotation.y = Math.PI / 2;
        marginPlane2.position.x = 5; // 초기 마진 거리
        planeGroup.add(marginPlane2);

        scene.add(planeGroup);

        // 6. UI 컨트롤 이벤트 연동
        const angleSlider = document.getElementById('angleY');
        const marginSlider = document.getElementById('marginSize');

        angleSlider.addEventListener('input', (e) => {
            // 평면의 각도(법선벡터의 방향)를 조절
            planeGroup.rotation.y = parseFloat(e.target.value);
        });

        marginSlider.addEventListener('input', (e) => {
            // 점과 평면 사이의 거리(마진) 조절
            const dist = parseFloat(e.target.value);
            marginPlane1.position.x = -dist;
            marginPlane2.position.x = dist;
            marginPlane1.position.set(-dist, 0, 0);
            marginPlane2.position.set(dist, 0, 0);
        });

        // 화면 크기 변경 대응
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 7. 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 마우스 상호작용 업데이트
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
